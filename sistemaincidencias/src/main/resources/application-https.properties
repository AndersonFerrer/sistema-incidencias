# Perfil HTTPS (RNF-10 del change "quick wins").
#
# Activar con: SPRING_PROFILES_ACTIVE=https ./mvnw spring-boot:run
# o en application.properties local: spring.profiles.active=https
#
# Cert autofirmado para localhost/dev (valido 365 dias). En produccion
# real, NUNCA usar este cert — utilizar uno firmado por Let's Encrypt
# (certbot) o el CA institucional, entregado al backend via variables
# de entorno / volumenes montados.

server.port=8443

server.ssl.key-store-type=PKCS12
server.ssl.key-store=classpath:dev-localhost.p12
server.ssl.key-store-password=changeit
server.ssl.key-alias=dev-localhost
