# openspec/config.yaml
# SDD configuration for sistema-incidencias.
# Generated by sdd-init. Do not edit phase rules without orchestrator approval.

project: sistema-incidencias
mode: hybrid      # persists to both openspec/ files and engram observations
strict_tdd: false # frontend has no test runner; backend has minimal test skeleton
review_budget: 400
pace: auto
delivery_strategy: ask-on-risk

context: |
  Dual-component project. Backend `sistemaincidencias/` is Spring Boot 4.0.6
  on Java 21, uses DAO + native SQL (no Spring Data), JWT auth, Lombok,
  Guava, Apache Commons, Apache POI, PostgreSQL. Frontend `frontend/` is
  Vite + React 19 + TypeScript 5.8 + TanStack Router + Zustand + Tailwind
  v4 + shadcn/ui + lucide-react + Recharts. Conventions are documented in
  `sistemaincidencias/AGENTS.md` (backend) and
  `.agents/skills/gestincidencias-frontend/SKILL.md` (frontend). Postman
  collection at `sistemaincidencias/postman/SistemaIncidencias.postman_collection.json`
  is the source of truth for endpoint contracts.

testing:
  strict_tdd: false
  rationale: |
    Frontend has no test runner configured (no vitest/jest/RTL).
    Backend has an empty `src/test/java` skeleton and only the
    `spring-boot-starter-webmvc-test` dependency. The skill and
    AGENTS.md do not require strict TDD; verification relies on
    lint + build + manual smoke.
  backend:
    runner: junit5
    command: "cd sistemaincidencias && ./mvnw test"
    layers:
      unit: limited      # no example tests yet
      integration: limited
      e2e: false
  frontend:
    runner: none
    command: null
    layers:
      unit: false
      integration: false
      e2e: false
    verification:
      - "cd frontend && npm run lint"
      - "cd frontend && npm run build"
      - "manual: http://127.0.0.1:5173/ for layout/private-route"
  coverage:
    available: false

phases:
  explore:
    owner: orchestrator
    output: clarification notes
  propose:
    owner: orchestrator
    output: openspec/changes/<id>/proposal.md
  spec:
    owner: orchestrator
    output: openspec/changes/<id>/specs/**/*.md (delta specs)
  design:
    owner: orchestrator
    output: openspec/changes/<id>/design.md
  tasks:
    owner: orchestrator
    output: openspec/changes/<id>/tasks.md
  apply:
    owner: sdd-apply
    forbidden_for_init: true
  verify:
    owner: sdd-verify
    forbidden_for_init: true
  archive:
    owner: sdd-archive
    forbidden_for_init: true

engram:
  topic_key: sdd-init/sistema-incidencias
  testing_topic_key: sdd/sistema-incidencias/testing-capabilities
  skill_registry_topic_key: skill-registry
  capture_prompt_for_automated_saves: false

conventions:
  backend_skill: "sistemaincidencias/AGENTS.md"
  frontend_skill: ".agents/skills/gestincidencias-frontend/SKILL.md"
  postman: "sistemaincidencias/postman/SistemaIncidencias.postman_collection.json"
  architecture:
    - controller (REST)
    - service (business + transactions)
    - dao (native SQL via JdbcTemplate or java.sql)
    - mapper (ResultSet -> POJO)
    - sql (constants/builders)
    - model (POJO, no ORM)
    - dto (request/response)
  forbidden:
    - Spring Data JPA / Hibernate / JPA annotations
    - SQL in controllers
    - business rules in DAOs
    - direct DAO calls from controllers
